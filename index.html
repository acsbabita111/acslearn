<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Applied Computer School</title>

<style>
body{
  margin:0;
  font-family:"Hind","Noto Sans Devanagari",sans-serif;
  background:#f4f6fb;
}
.container{
  max-width:430px;
  margin:auto;
  padding:12px;
}

/* HEADER */
.header{
  background:linear-gradient(180deg,#ff9933,#ffffff,#138808);
  border-radius:18px;
  text-align:center;
  padding:16px;
}
.logo{
  width:70px;
  height:70px;
  border-radius:50%;
  background:white;
  padding:6px;
}
.title{font-size:18px;font-weight:700;}
.tagline{font-size:14px;color:#333;}

/* LANGUAGE */
.lang span{
  display:inline-block;
  margin:4px;
  cursor:pointer;
  color:#0b57d0;
}
.lang span.active{
  background:#0b57d0;
  color:white;
  padding:4px 6px;
  border-radius:6px;
}

/* COURSE NAV */
.nav{
  display:flex;
  overflow-x:auto;
  gap:8px;
  margin-top:10px;
}
.nav span{
  background:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}
.nav span.active{
  background:#16a34a;
  color:white;
}

/* HERO */
.hero{margin-top:12px;}
.hero img{width:100%;border-radius:12px;}

/* BUTTON */
.cta{
  display:block;
  text-align:center;
  background:#16a34a;
  color:white;
  padding:14px;
  border-radius:12px;
  margin-top:12px;
  text-decoration:none;
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<div class="header">
  <img src="logo.png" class="logo">

  <div class="title" id="title"></div>
  <div class="tagline" id="tagline"></div>

  <!-- LANGUAGE -->
  <div class="lang">
    🌐 Language:<br>
    <span onclick="setLang('hi')" id="l_hi">हिंदी</span>
    <span onclick="setLang('en')" id="l_en">English</span>
    <span onclick="setLang('ar')" id="l_ar">العربية</span>
    <span onclick="setLang('bn')" id="l_bn">বাংলা</span>
    <span onclick="setLang('fr')" id="l_fr">Français</span><br>

    <span onclick="setLang('de')" id="l_de">Deutsch</span>
    <span onclick="setLang('id')" id="l_id">Bahasa</span>
    <span onclick="setLang('ja')" id="l_ja">日本語</span>
    <span onclick="setLang('zh')" id="l_zh">中文</span><br>

    <span onclick="setLang('pt')" id="l_pt">Português</span>
    <span onclick="setLang('ru')" id="l_ru">Русский</span>
    <span onclick="setLang('es')" id="l_es">Español</span>
    <span onclick="setLang('ur')" id="l_ur">اردو</span>
  </div>

  <!-- COURSE SWITCH -->
  <div class="nav">
    <span onclick="setCourse('ai')">AI</span>
    <span onclick="setCourse('social')">Social</span>
    <span onclick="setCourse('700')">700</span>
    <span onclick="setCourse('shayari')">Shayari</span>
    <span onclick="setCourse('sanskrit')">Sanskrit</span>
    <span onclick="setCourse('typing')">Typing</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="hero.jpg">
</div>

<!-- START -->
<a id="startBtn" href="L001.html" class="cta">
🚀 Start Learning
</a>

</div>

<script>

const LANG = {
hi:{title:"Applied Computer School",tagline:"2011 से डिजिटल शिक्षा"},
en:{title:"Applied Computer School",tagline:"Digital Education Since 2011"},
ar:{title:"مدرسة الكمبيوتر التطبيقية",tagline:"تعليم رقمي منذ 2011"}
};

function setLang(code){
  localStorage.setItem("lang",code);
  let L = LANG[code] || LANG["en"];

  document.getElementById("title").innerText=L.title;
  document.getElementById("tagline").innerText=L.tagline;

  document.querySelectorAll(".lang span").forEach(e=>e.classList.remove("active"));
  document.getElementById("l_"+code)?.classList.add("active");

  if(code==="ar" || code==="ur"){
    document.body.style.direction="rtl";
  }else{
    document.body.style.direction="ltr";
  }
}

function setCourse(c){
  localStorage.setItem("course",c);

  document.querySelectorAll(".nav span").forEach(e=>e.classList.remove("active"));
  event.target.classList.add("active");

  // अभी सभी Hindi course पर ही जाएंगे
  document.getElementById("startBtn").href = "L001.html";
}

// LOAD DEFAULT
setLang(localStorage.getItem("lang") || "hi");

</script>

</body>
</html>
