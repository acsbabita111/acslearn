<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACS Learn | Social Media Master</title>

<meta name="description" content="Learn Social Media using mobile.">

<style>
body{
  margin:0;
  font-family:"Hind","Noto Sans Devanagari",sans-serif;
  background:#f4f6fb;
}
.container{
  max-width:430px;
  margin:auto;
  padding:12px;
}

/* HEADER */
.header{
  background:linear-gradient(180deg,#ff9933,#ffffff,#138808);
  border-radius:18px;
  text-align:center;
  padding:16px;
}
.logo{
  width:70px;
  height:70px;
  object-fit:contain;
  border-radius:50%;
  background:white;
  padding:6px;
}
.title{font-size:18px;font-weight:700;}
.tagline{font-size:14px;color:#333;}

/* LANGUAGE */
.lang{
  margin-top:10px;
  font-size:14px;
}
.lang span{
  display:inline-block;
  margin:4px 6px;
  cursor:pointer;
  color:#0b57d0;
  padding:4px 6px;
  border-radius:6px;
}
.lang span.active{
  background:#0b57d0;
  color:white;
}

/* HERO */
.hero{margin-top:14px;position:relative;}
.hero img{width:100%;border-radius:16px;}
.hero-text{
  position:absolute;
  bottom:14px;
  left:10px;
  right:10px;
  background:rgba(0,0,0,0.45);
  color:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* CTA */
.cta{
  display:block;
  text-align:center;
  background:linear-gradient(135deg,#16a34a,#22c55e);
  color:white;
  padding:14px;
  border-radius:14px;
  margin-top:12px;
  font-weight:bold;
  text-decoration:none;
}

/* SECTION */
.section{margin-top:18px;}
</style>
</head>

<body>
<div class="container">

<!-- HEADER -->
<div class="header">
  <img src="./logo.png" class="logo">

  <div class="title" id="title"></div>
  <div class="tagline" id="tagline"></div>

  <div class="lang">
    🌐 Language:<br>

    <span onclick="setLang('hi')" id="l_hi">हिंदी</span>
    <span onclick="setLang('en')" id="l_en">English</span>
    <span onclick="setLang('ar')" id="l_ar">العربية</span>
    <span onclick="setLang('bn')" id="l_bn">বাংলা</span>
    <span onclick="setLang('fr')" id="l_fr">Français</span><br>

    <span onclick="setLang('de')" id="l_de">Deutsch</span>
    <span onclick="setLang('id')" id="l_id">Bahasa</span>
    <span onclick="setLang('ja')" id="l_ja">日本語</span>
    <span onclick="setLang('zh')" id="l_zh">中文</span><br>

    <span onclick="setLang('pt')" id="l_pt">Português</span>
    <span onclick="setLang('ru')" id="l_ru">Русский</span>
    <span onclick="setLang('es')" id="l_es">Español</span>
    <span onclick="setLang('ur')" id="l_ur">اردو</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <img src="hero.jpg">
  <div class="hero-text" id="heroText"></div>
</div>

<a href="https://acslearn.com" class="cta" id="btn"></a>

<div class="section">
  <h3 id="aboutTitle"></h3>
  <p id="aboutText"></p>
</div>

</div>

<script>
const LANG = {
hi:{title:"सोशल मीडिया मास्टर",tagline:"मोबाइल से सीखो",hero:"हर बच्चे को अवसर",btn:"🚀 शुरू करें",aboutTitle:"हम क्या सिखाते हैं",aboutText:"हम सोशल मीडिया सिखाते हैं।"},
en:{title:"Social Media Master",tagline:"Learn with mobile",hero:"Digital opportunity",btn:"🚀 Start",aboutTitle:"What We Teach",aboutText:"We teach social media."},
ar:{title:"خبير التواصل",tagline:"تعلم بالهاتف",hero:"فرصة رقمية",btn:"🚀 ابدأ",aboutTitle:"ماذا نعلم",aboutText:"نحن نعلم وسائل التواصل."},
bn:{title:"সোশ্যাল মিডিয়া",tagline:"মোবাইলে শিখুন",hero:"ডিজিটাল সুযোগ",btn:"🚀 শুরু",aboutTitle:"আমরা শেখাই",aboutText:"আমরা সোশ্যাল মিডিয়া শেখাই।"},
fr:{title:"Médias sociaux",tagline:"Apprendre mobile",hero:"Opportunité",btn:"🚀 Commencer",aboutTitle:"Nous enseignons",aboutText:"Réseaux sociaux."},
de:{title:"Social Media",tagline:"Mit Handy lernen",hero:"Digitale Chance",btn:"🚀 Start",aboutTitle:"Was wir lehren",aboutText:"Social Media."},
id:{title:"Media Sosial",tagline:"Belajar mobile",hero:"Peluang digital",btn:"🚀 Mulai",aboutTitle:"Kami ajarkan",aboutText:"Media sosial."},
ja:{title:"ソーシャルメディア",tagline:"モバイル学習",hero:"デジタル機会",btn:"🚀 開始",aboutTitle:"教える内容",aboutText:"SNSです。"},
zh:{title:"社交媒体",tagline:"手机学习",hero:"数字机会",btn:"🚀 开始",aboutTitle:"我们教",aboutText:"社交媒体。"},
pt:{title:"Mídias sociais",tagline:"Aprender mobile",hero:"Oportunidade",btn:"🚀 Começar",aboutTitle:"Ensinamos",aboutText:"Redes sociais."},
ru:{title:"Соцсети",tagline:"Учись с телефона",hero:"Цифровая возможность",btn:"🚀 Начать",aboutTitle:"Мы учим",aboutText:"Соцсети."},
es:{title:"Redes sociales",tagline:"Aprender móvil",hero:"Oportunidad",btn:"🚀 Empezar",aboutTitle:"Enseñamos",aboutText:"Redes sociales."},
ur:{title:"سوشل میڈیا",tagline:"موبائل سے سیکھیں",hero:"ڈیجیٹل موقع",btn:"🚀 شروع",aboutTitle:"ہم سکھاتے ہیں",aboutText:"سوشل میڈیا۔"}
};

/* APPLY LANGUAGE */
function applyLang(code){
  let L = LANG[code];

  document.getElementById("title").innerText=L.title;
  document.getElementById("tagline").innerText=L.tagline;
  document.getElementById("heroText").innerText=L.hero;
  document.getElementById("btn").innerText=L.btn;
  document.getElementById("aboutTitle").innerText=L.aboutTitle;
  document.getElementById("aboutText").innerText=L.aboutText;

  // highlight active
  document.querySelectorAll(".lang span").forEach(el=>el.classList.remove("active"));
  document.getElementById("l_"+code).classList.add("active");

  // RTL support
  if(code==="ar" || code==="ur"){
    document.body.style.direction="rtl";
  } else {
    document.body.style.direction="ltr";
  }
}

/* CLICK */
function setLang(code){
  localStorage.setItem("lang",code);
  applyLang(code);
}

/* AUTO LOAD */
let saved = localStorage.getItem("lang") || "hi";
applyLang(saved);

</script>

</body>
</html>
