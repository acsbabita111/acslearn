/* ===== AUTO DETECT ===== */
function detectLang(){
  let lang = navigator.language || "en";

  if(lang.includes("hi")) return "hi";
  if(lang.includes("ar")) return "ar";
  if(lang.includes("bn")) return "bn";
  if(lang.includes("fr")) return "fr";
  if(lang.includes("de")) return "de";
  if(lang.includes("id")) return "id";
  if(lang.includes("ja")) return "ja";
  if(lang.includes("zh")) return "zh";
  if(lang.includes("pt")) return "pt";
  if(lang.includes("ru")) return "ru";
  if(lang.includes("es")) return "es";
  if(lang.includes("ur")) return "ur";

  return "en";
}

/* ===== APPLY ===== */
function applyLang(code){
  let L = LANG[code];

  document.getElementById("title").innerText = L.title;
  document.getElementById("tagline").innerText = L.tagline;
  document.getElementById("heroText").innerText = L.hero;
  document.getElementById("btn").innerText = L.btn;
  document.getElementById("aboutTitle").innerText = L.aboutTitle;
  document.getElementById("aboutText").innerText = L.aboutText;
}

/* INIT */
let saved = localStorage.getItem("lang");
let finalLang = saved || detectLang();

applyLang(finalLang);

</script>
