<meta charset="UTF-8">

<title>ACS Student Login — Progress</title>

<style>
:root{
  --bg:#070b18;--paper:#ffffff;--ink:#101827;--muted:#526078;--line:#e7eaf1;
  --purple:#7c3aed;--pink:#ec4899;--blue:#2563eb;--green:#16a34a;--gold:#f59e0b;--red:#ef4444;
  --shadow:0 24px 70px rgba(15,23,42,.14);--soft:0 12px 34px rgba(15,23,42,.10);--radius:28px;--max:1180px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:Hind,system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:#f6f7fb;color:var(--ink);line-height:1.65}
a{text-decoration:none;color:inherit}
.wrap{max-width:var(--max);margin:auto;padding:18px}
.acs-nav{position:sticky;top:0;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.acs-nav-in{max-width:var(--max);margin:auto;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px}
.acs-brand{font-weight:900;letter-spacing:-.02em;color:#111827}
.acs-menu{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end}
.acs-menu a{padding:9px 12px;border-radius:999px;font-weight:900;color:#1f2937}
.acs-menu a:hover,.acs-menu a.active{background:#f3f4f6;color:var(--purple)}
.hero{color:#fff;min-height:84vh;display:grid;align-items:center;padding:44px 0;background:radial-gradient(circle at 18% 18%,rgba(124,58,237,.42),transparent 32%),radial-gradient(circle at 88% 12%,rgba(236,72,153,.34),transparent 30%),linear-gradient(135deg,#060914,#111936 68%,#21113e)}
.hero-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:24px;align-items:center}
.badge{display:inline-flex;align-items:center;gap:8px;padding:9px 13px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);font-weight:900}
h1{font-size:clamp(2.4rem,7.5vw,5.6rem);line-height:.96;margin:16px 0 12px;letter-spacing:-.055em}
.lead{font-size:clamp(1.2rem,3.3vw,2.45rem);font-weight:900;line-height:1.18;margin:0 0 12px;color:#fff}
.hero p{font-size:clamp(1.02rem,2vw,1.25rem);max-width:900px;color:#e9ecff;font-weight:700}
.hero-card{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:30px;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.28)}
.btn-row{display:flex;flex-wrap:wrap;gap:12px;margin-top:22px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;padding:12px 16px;border-radius:16px;font-weight:900;border:1px solid var(--line);background:#fff;color:#111827;box-shadow:0 8px 20px rgba(15,23,42,.06)}
.btn.primary{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border:0}
.btn.dark{background:#111827;color:#fff;border:0}
.section{padding:40px 0}
.section h2{font-size:clamp(1.75rem,4vw,3rem);line-height:1.08;margin:0 0 10px;letter-spacing:-.035em}
.sub{color:var(--muted);font-weight:700;margin:0 0 20px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card h3{margin:0 0 8px;font-size:1.28rem;line-height:1.25}
.card p{margin:0 0 12px;color:var(--muted);font-weight:700}
.notice{border-left:6px solid var(--gold);background:#fff7ed}
.kpi{font-size:2.1rem;font-weight:900;color:var(--purple)}
.trust-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.trust{background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;text-align:center;box-shadow:var(--soft);font-weight:900}
.path{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px}
.path .card{position:relative;overflow:hidden}
.path .card:before{content:"";position:absolute;inset:0 0 auto 0;height:6px;background:linear-gradient(90deg,var(--purple),var(--pink))}
.level-tag{display:inline-flex;padding:7px 10px;border-radius:999px;background:#ecfdf5;color:#166534;font-weight:900;margin:4px 0 10px}
.big-diagram{border-radius:32px;border:1px solid var(--line);background:#fff;box-shadow:var(--shadow);padding:18px;margin:20px 0}
.big-diagram svg{width:100%;height:auto;min-height:420px;display:block}
.form-card{max-width:720px;margin:26px auto;background:#fff;border:1px solid var(--line);border-radius:30px;padding:24px;box-shadow:var(--shadow)}
.input{width:100%;min-height:48px;border:1px solid #d1d5db;border-radius:16px;padding:0 14px;font-size:1rem;font-weight:700;margin:8px 0 14px}
.footer{padding:28px;text-align:center;font-weight:900;color:#4b5563}
@media(max-width:960px){.hero-grid,.grid2{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.trust-grid,.path{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.wrap{padding:14px}.grid,.trust-grid,.path{grid-template-columns:1fr}.hero{min-height:auto}.card{padding:18px}.acs-nav-in{align-items:flex-start;flex-direction:column}.acs-menu{justify-content:flex-start}.big-diagram svg{min-height:300px}}
</style>
