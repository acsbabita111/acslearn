<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Offline — ACS Vani</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Devanagari',sans-serif;background:#0B1F3A;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
.wrap{max-width:300px}
.logo{width:80px;height:80px;border-radius:20px;margin:0 auto 20px;display:block}
h1{font-size:24px;font-weight:800;margin-bottom:10px;color:#F9A825}
p{font-size:14px;color:rgba(255,255,255,0.7);line-height:1.6;margin-bottom:20px}
.btn{display:inline-block;padding:12px 28px;background:#1565C0;color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
.wifi{font-size:60px;margin-bottom:16px}
</style>
</head>
<body>
<div class="wrap">
  <div class="wifi">📵</div>
  <img src="https://acsbabita111.github.io/acslearn/logo.png" alt="ACS" class="logo"/>
  <h1>ACS Vani</h1>
  <p>अभी Internet नहीं है।<br/>जो pages पहले खुले थे वो काम करेंगे।<br/>Internet आने पर automatically update होगा।</p>
  <button class="btn" onclick="window.location.reload()">🔄 फिर try करें</button>
</div>
</body>
</html>
