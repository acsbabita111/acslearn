<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ACS AI Video Creator — 150 Lessons</title>

<!-- SEO / WhatsApp Preview -->
<link rel="canonical" href="https://acslearn.com/vc/hi/index.html">
<meta property="og:title" content="ACS AI Video Creator — 150 Lessons">
<meta property="og:description" content="Mobile se video banana seekho — full free course (150 lessons)">
<meta property="og:url" content="https://acslearn.com/vc/hi/index.html">
<meta property="og:type" content="website">

<style>
:root{
  --bg:#0b1220;
  --card:#1e293b;
  --card2:#334155;
  --accent:#22c55e;
  --accent2:#FFD740;
  --text:#ffffff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui, -apple-system, "Hind", sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:430px;
  margin:auto;
  padding:12px;
}

@media(min-width:1024px){
  .container{max-width:1100px;}
}

.hero{
  background:linear-gradient(135deg,#2563eb,#1e40af);
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.hero h1{margin:0;font-size:20px}
.hero p{margin-top:8px;font-size:14px}

.btn{
  display:block;
  margin-top:12px;
  text-align:center;
  padding:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.start{background:var(--accent);color:#000}
.continue{background:var(--accent2);color:#000}

.search{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  margin-top:12px;
}

.filter{
  margin-top:10px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.filter button{
  flex:1;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.level-tag{
  background:#FFD740;
  color:#000;
  padding:6px;
  border-radius:6px;
  margin-top:12px;
  font-weight:bold;
}

.lesson-row{
  display:block;
  background:var(--card);
  margin:6px 0;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  color:#fff;
  transition:.2s;
}

.lesson-row:hover{background:var(--card2)}
.lesson-row:active{
  transform:scale(0.97);
  background:#2d3b55;
}

.share{
  display:block;
  text-align:center;
  background:#25D366;
  color:#000;
  padding:12px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  margin-top:14px;
}

/* Back to top */
#topBtn{
  position:fixed;
  bottom:20px;
  right:15px;
  display:none;
  background:var(--accent);
  color:#000;
  border:none;
  padding:10px 14px;
  border-radius:50%;
  font-size:18px;
  cursor:pointer;
  z-index:999;
}
</style>
</head>

<body>

<div class="container">

<!-- HERO -->
<div class="hero">
  <h1>🎬 मोबाइल से वीडियो बनाना सीखो</h1>
  <p>यार, पूरा कर लिया — अपना वीडियो और चैनल बना लोगे</p>

  <a href="https://acslearn.com/vc/hi/L001.html" class="btn start">🚀 शुरू करो (Lesson 1)</a>
  <a id="continueBtn" class="btn continue">👉 जहाँ छोड़ा था, वहीं से शुरू करो</a>

  <input id="searchInput" class="search" placeholder="🔍 lesson खोजो...">

  <div class="filter">
    <button onclick="filterLevel('all')">All</button>
    <button onclick="filterLevel('l1')">Level 1</button>
    <button onclick="filterLevel('l2')">Level 2</button>
    <button onclick="filterLevel('l3')">Level 3</button>
  </div>

  <div style="margin-top:8px;font-size:13px;">📘 Total Lessons: 150</div>
</div>

<!-- LESSON LIST -->
<div id="list"></div>

<a class="share" href="https://wa.me/?text=🎬%20Mobile%20se%20Video%20banana%20seekho%20👇%0Ahttps://acslearn.com/vc/hi/index.html">
📲 दोस्तों को भेजो
</a>

</div>

<!-- TOP BUTTON -->
<button id="topBtn">↑</button>

<script>
// ===== Generate 150 lessons (absolute links) =====
const box = document.getElementById("list");

// Level mapping: 1–50 (l1), 51–100 (l2), 101–150 (l3)
for(let i=1;i<=150;i++){
  let num = String(i).padStart(3,'0');
  let levelClass = (i<=50) ? "l1" : (i<=100 ? "l2" : "l3");

  // level separators
  if(i===1){
    box.insertAdjacentHTML("beforeend", `<div class="level-tag">🟢 LEVEL 1 — शुरुआत</div>`);
  }
  if(i===51){
    box.insertAdjacentHTML("beforeend", `<div class="level-tag">🔵 LEVEL 2 — बनाओ</div>`);
  }
  if(i===101){
    box.insertAdjacentHTML("beforeend", `<div class="level-tag">🔴 LEVEL 3 — काम/कमाई</div>`);
  }

  const a = document.createElement("a");
  a.className = "lesson-row " + levelClass;
  a.href = "https://acslearn.com/vc/hi/L"+num+".html";
  a.innerText = "Lesson " + num;
  a.setAttribute("data-idx", i);

  // save last lesson on click
  a.addEventListener("click", ()=>{
    localStorage.setItem("acs_last", i);
  });

  box.appendChild(a);
}

// ===== Search =====
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("keyup", function(){
  let f = this.value.toLowerCase();
  document.querySelectorAll(".lesson-row").forEach(el=>{
    el.style.display = el.innerText.toLowerCase().includes(f) ? "" : "none";
  });
});

// ===== Level filter =====
function filterLevel(level){
  document.querySelectorAll(".lesson-row").forEach(el=>{
    if(level==="all") el.style.display="";
    else el.style.display = el.classList.contains(level) ? "" : "none";
  });
}

// ===== Continue button =====
const btn = document.getElementById("continueBtn");
let last = localStorage.getItem("acs_last");
if(last){
  let n = String(last).padStart(3,'0');
  btn.href = "https://acslearn.com/vc/hi/L"+n+".html";
}else{
  btn.href = "https://acslearn.com/vc/hi/L001.html";
}

// ===== Back to top =====
const topBtn = document.getElementById("topBtn");
window.onscroll = function(){
  topBtn.style.display = (document.documentElement.scrollTop>300) ? "block" : "none";
};
topBtn.onclick = ()=>window.scrollTo({top:0,behavior:'smooth'});

</script>

</body>
</html>
